<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627">
  <defs>
    <linearGradient id="bottomLift" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#05060a" stop-opacity="0.70" />
      <stop offset="55%" stop-color="#05060a" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#05060a" stop-opacity="0.10" />
    </linearGradient>

    <radialGradient id="glowCyan" cx="18%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#48d6ff" stop-opacity="0.16" />
      <stop offset="60%" stop-color="#48d6ff" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#48d6ff" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glowPurple" cx="88%" cy="18%" r="75%">
      <stop offset="0%" stop-color="#7b6cff" stop-opacity="0.20" />
      <stop offset="65%" stop-color="#7b6cff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#7b6cff" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="vignette" cx="50%" cy="50%" r="72%">
      <stop offset="58%" stop-color="#05060a" stop-opacity="0" />
      <stop offset="100%" stop-color="#05060a" stop-opacity="0.58" />
    </radialGradient>

    <filter id="softText" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.55" />
    </filter>

    <filter id="logoShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000000" flood-opacity="0.45" />
    </filter>

    <filter id="accentGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#48d6ff" flood-opacity="0.22" />
      <feDropShadow dx="0" dy="0" stdDeviation="24" flood-color="#7b6cff" flood-opacity="0.14" />
    </filter>
  </defs>

  <!-- Background photo -->
  <image href="StockCake-Late_Night_Architect-1477274-standard.jpg"
         x="0" y="0" width="1200" height="627"
         preserveAspectRatio="xMidYMid slice" />

  <!-- Brand overlays -->
  <rect x="0" y="0" width="1200" height="627" fill="url(#bottomLift)" />
  <rect x="0" y="0" width="1200" height="627" fill="url(#glowCyan)" />
  <rect x="0" y="0" width="1200" height="627" fill="url(#glowPurple)" />
  <rect x="0" y="0" width="1200" height="627" fill="url(#vignette)" />

  <!-- Attention grabber: calm "architecture-to-AI" overlay (no warning vibes) -->
  <g opacity="0.95" filter="url(#accentGlow)">
    <!-- blueprint highlight frame -->
    <rect x="112" y="350" width="520" height="170" rx="18" fill="none" stroke="#f5f7ff" stroke-opacity="0.14" stroke-width="2" />
    <path d="M140 392 H604" stroke="#48d6ff" stroke-opacity="0.30" stroke-width="3" stroke-linecap="round" />
    <path d="M140 438 H520" stroke="#7b6cff" stroke-opacity="0.24" stroke-width="3" stroke-linecap="round" />
    <path d="M140 484 H580" stroke="#48d6ff" stroke-opacity="0.22" stroke-width="3" stroke-linecap="round" />

    <!-- small "AI" node cluster to the right, connected softly -->
    <path d="M632 436 C700 408, 740 404, 806 432" fill="none" stroke="#b2b7d3" stroke-opacity="0.20" stroke-width="2" />
    <g fill="#48d6ff" fill-opacity="0.80">
      <circle cx="806" cy="432" r="5" />
      <circle cx="772" cy="404" r="4" />
      <circle cx="736" cy="446" r="4" />
      <circle cx="708" cy="416" r="4" />
    </g>
    <g stroke="#f5f7ff" stroke-opacity="0.14" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M708 416 L772 404 L806 432" />
      <path d="M708 416 L736 446 L806 432" />
    </g>
  </g>

  <!-- Logo signature (bottom-right) -->
  <g transform="translate(1150,596)" opacity="0.70" filter="url(#logoShadow)">
    <image href="../logo-only-white-transbg.png" x="-56" y="-56" width="56" height="56" preserveAspectRatio="xMidYMid meet" />
  </g>
</svg>
