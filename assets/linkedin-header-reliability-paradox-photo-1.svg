<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627">
  <defs>
    <linearGradient id="leftDark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#05060a" stop-opacity="0.72" />
      <stop offset="55%" stop-color="#05060a" stop-opacity="0.38" />
      <stop offset="100%" stop-color="#05060a" stop-opacity="0.10" />
    </linearGradient>

    <radialGradient id="glowCyan" cx="14%" cy="20%" r="65%">
      <stop offset="0%" stop-color="#48d6ff" stop-opacity="0.18" />
      <stop offset="55%" stop-color="#48d6ff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#48d6ff" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="glowPurple" cx="86%" cy="12%" r="75%">
      <stop offset="0%" stop-color="#7b6cff" stop-opacity="0.22" />
      <stop offset="60%" stop-color="#7b6cff" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#7b6cff" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="55%" stop-color="#05060a" stop-opacity="0" />
      <stop offset="100%" stop-color="#05060a" stop-opacity="0.55" />
    </radialGradient>

    <filter id="softText" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.55" />
    </filter>

    <filter id="logoShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000000" flood-opacity="0.45" />
    </filter>

    <filter id="accentGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#48d6ff" flood-opacity="0.25" />
      <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#7b6cff" flood-opacity="0.16" />
    </filter>
  </defs>

  <!-- Background photo -->
  <image href="StockCake-Architect's_Nighttime_Work-1303075-standard.jpg"
         x="0" y="0" width="1200" height="627"
         preserveAspectRatio="xMidYMid slice" />

  <!-- Brand overlays (calm + trustworthy) -->
  <rect x="0" y="0" width="1200" height="627" fill="url(#leftDark)" />
  <rect x="0" y="0" width="1200" height="627" fill="url(#glowCyan)" />
  <rect x="0" y="0" width="1200" height="627" fill="url(#glowPurple)" />
  <rect x="0" y="0" width="1200" height="627" fill="url(#vignette)" />

  <!-- Attention grabber: highlighted blueprint loop + small "AI" node constellation -->
  <g opacity="0.92" filter="url(#accentGlow)">
    <!-- infinity-ish highlight -->
    <path
      d="M760 336 C710 276, 610 282, 600 332 C590 382, 680 404, 720 360
         C770 306, 870 310, 880 356 C892 410, 792 430, 760 386"
      fill="none"
      stroke="#48d6ff"
      stroke-opacity="0.55"
      stroke-width="3"
      stroke-linecap="round"
    />
    <path
      d="M760 336 C710 276, 610 282, 600 332 C590 382, 680 404, 720 360"
      fill="none"
      stroke="#7b6cff"
      stroke-opacity="0.35"
      stroke-width="3"
      stroke-linecap="round"
    />

    <!-- node constellation -->
    <g fill="#48d6ff" fill-opacity="0.80">
      <circle cx="640" cy="330" r="4.5" />
      <circle cx="700" cy="292" r="4" />
      <circle cx="780" cy="304" r="4" />
      <circle cx="842" cy="348" r="4.5" />
      <circle cx="760" cy="404" r="4.2" />
    </g>
    <g stroke="#f5f7ff" stroke-opacity="0.18" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M640 330 L700 292 L780 304 L842 348" />
      <path d="M700 292 L760 336 L760 404" />
    </g>
  </g>

  <!-- Optional safe text area (kept subtle; remove if you don't want text on image) -->
  <g filter="url(#softText)">
    <text x="84" y="205"
          font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="44"
          font-weight="700"
          fill="#f5f7ff"
          fill-opacity="0.95">
      The Reliability Paradox
    </text>
    <text x="84" y="255"
          font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="24"
          font-weight="500"
          fill="#b2b7d3"
          fill-opacity="0.92">
      Why Smarter AI Demands Smarter Architecture
    </text>
  </g>

  <!-- Logo signature (bottom-right) -->
  <g transform="translate(1150,596)" opacity="0.70" filter="url(#logoShadow)">
    <image href="../logo-only-white-transbg.png" x="-56" y="-56" width="56" height="56" preserveAspectRatio="xMidYMid meet" />
  </g>
</svg>

