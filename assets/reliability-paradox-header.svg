<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="627" viewBox="0 0 1200 627">
  <defs>
    <radialGradient id="glowCyan" cx="10%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#48d6ff" stop-opacity="0.14" />
      <stop offset="45%" stop-color="#48d6ff" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#48d6ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowPurple" cx="90%" cy="10%" r="70%">
      <stop offset="0%" stop-color="#7b6cff" stop-opacity="0.22" />
      <stop offset="50%" stop-color="#7b6cff" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#7b6cff" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="gridFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f5f7ff" stop-opacity="0.10" />
      <stop offset="55%" stop-color="#f5f7ff" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#f5f7ff" stop-opacity="0" />
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.55" />
    </filter>

    <filter id="logoShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000000" flood-opacity="0.45" />
    </filter>

    <filter id="glowStrongCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#48d6ff" flood-opacity="0.45" />
      <feDropShadow dx="0" dy="0" stdDeviation="34" flood-color="#48d6ff" flood-opacity="0.16" />
    </filter>

    <filter id="glowStrongPurple" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#7b6cff" flood-opacity="0.42" />
      <feDropShadow dx="0" dy="0" stdDeviation="44" flood-color="#7b6cff" flood-opacity="0.14" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="627" fill="#05060a" />
  <rect width="1200" height="627" fill="url(#glowCyan)" />
  <rect width="1200" height="627" fill="url(#glowPurple)" />

  <!-- Paradox split (subtle seam) -->
  <path d="M740 -40 L600 667" fill="none" stroke="#f5f7ff" stroke-opacity="0.10" stroke-width="2" />
  <path d="M760 -40 L620 667" fill="none" stroke="#f5f7ff" stroke-opacity="0.05" stroke-width="10" />

  <!-- Subtle grid (left-weighted) -->
  <g opacity="0.35">
    <rect x="0" y="0" width="820" height="627" fill="none" />
    <g stroke="url(#gridFade)" stroke-width="1">
      <!-- verticals -->
      <path d="M80 0 V627" />
      <path d="M140 0 V627" />
      <path d="M200 0 V627" />
      <path d="M260 0 V627" />
      <path d="M320 0 V627" />
      <path d="M380 0 V627" />
      <path d="M440 0 V627" />
      <path d="M500 0 V627" />
      <path d="M560 0 V627" />
      <path d="M620 0 V627" />
      <path d="M680 0 V627" />
      <path d="M740 0 V627" />
      <path d="M800 0 V627" />
      <!-- horizontals -->
      <path d="M0 90 H820" />
      <path d="M0 150 H820" />
      <path d="M0 210 H820" />
      <path d="M0 270 H820" />
      <path d="M0 330 H820" />
      <path d="M0 390 H820" />
      <path d="M0 450 H820" />
      <path d="M0 510 H820" />
      <path d="M0 570 H820" />
    </g>
  </g>

  <!-- Architecture stack -->
  <g filter="url(#softShadow)" transform="translate(90,135)">
    <!-- outer guardrail -->
    <rect x="0" y="0" width="700" height="360" rx="28" fill="none" stroke="#f5f7ff" stroke-opacity="0.18" stroke-width="2" />

    <!-- layers -->
    <g fill="none" stroke="#f5f7ff" stroke-opacity="0.22" stroke-width="2">
      <rect x="46" y="56" width="608" height="60" rx="18" />
      <rect x="46" y="132" width="608" height="60" rx="18" />
      <rect x="46" y="208" width="608" height="60" rx="18" />
      <rect x="46" y="284" width="608" height="60" rx="18" />
    </g>

    <!-- faint layer labels (no text, just ticks) -->
    <g stroke="#b2b7d3" stroke-opacity="0.22" stroke-width="2" stroke-linecap="round">
      <path d="M92 86 H150" />
      <path d="M92 162 H188" />
      <path d="M92 238 H170" />
      <path d="M92 314 H210" />
    </g>

    <!-- reliability brace (subtle corner reinforcement) -->
    <path d="M24 24 H90 M24 24 V90" fill="none" stroke="#7b6cff" stroke-opacity="0.35" stroke-width="3" stroke-linecap="round" />
    <path d="M676 336 H610 M676 336 V270" fill="none" stroke="#7b6cff" stroke-opacity="0.25" stroke-width="3" stroke-linecap="round" />

    <!-- paradox crack: the stronger the "smart" signal, the more stress on the guardrail -->
    <path
      d="M700 84 L650 104 L692 132 L642 156 L686 182 L640 206 L680 236"
      fill="none"
      stroke="#ff7b8c"
      stroke-opacity="0.35"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <!-- control/guardrail signals (small) -->
    <g stroke="#5ee6a8" stroke-opacity="0.55" stroke-width="2" fill="none">
      <path d="M468 90 H560" />
      <path d="M468 166 H590" />
      <path d="M468 242 H542" />
      <path d="M468 318 H612" />
    </g>
    <g fill="#5ee6a8" fill-opacity="0.70">
      <circle cx="560" cy="90" r="3.5" />
      <circle cx="590" cy="166" r="3.5" />
      <circle cx="542" cy="242" r="3.5" />
      <circle cx="612" cy="318" r="3.5" />
    </g>
  </g>

  <!-- AI prominence (right side): a "capability orb" with neural/circuit detail -->
  <g transform="translate(860,308)">
    <!-- outer glow -->
    <circle cx="0" cy="0" r="170" fill="none" stroke="#7b6cff" stroke-opacity="0.10" stroke-width="2" />
    <circle cx="0" cy="0" r="138" fill="none" stroke="#48d6ff" stroke-opacity="0.10" stroke-width="2" />

    <!-- paradox loop (infinity-like) -->
    <path
      d="M-128 0 C-82 -74, -28 -74, 0 0 C28 74, 82 74, 128 0 C82 -74, 28 -74, 0 0 C-28 74, -82 74, -128 0 Z"
      fill="none"
      stroke="#f5f7ff"
      stroke-opacity="0.16"
      stroke-width="2"
    />

    <!-- orb body -->
    <circle cx="0" cy="0" r="108" fill="#141829" fill-opacity="0.82" stroke="#f5f7ff" stroke-opacity="0.14" stroke-width="2" />
    <circle cx="0" cy="0" r="106" fill="none" stroke="#48d6ff" stroke-opacity="0.18" stroke-width="1.5" filter="url(#glowStrongCyan)" />

    <!-- neural/circuit lines -->
    <g fill="none" stroke="#48d6ff" stroke-opacity="0.75" stroke-width="2" filter="url(#glowStrongCyan)">
      <path d="M-54 -28 C-26 -58, 18 -58, 48 -26" />
      <path d="M-60 30 C-24 8, 10 10, 56 44" />
      <path d="M-10 -78 V-30" />
      <path d="M34 76 V28" />
      <path d="M-72 6 H-30" />
      <path d="M30 -4 H78" />
    </g>
    <g fill="#48d6ff" fill-opacity="0.92" filter="url(#glowStrongCyan)">
      <circle cx="-54" cy="-28" r="5" />
      <circle cx="48" cy="-26" r="5" />
      <circle cx="-60" cy="30" r="5" />
      <circle cx="56" cy="44" r="5" />
      <circle cx="-10" cy="-78" r="4.5" />
      <circle cx="34" cy="76" r="4.5" />
      <circle cx="-72" cy="6" r="4.5" />
      <circle cx="78" cy="-4" r="4.5" />
    </g>

    <!-- capability highlight -->
    <circle cx="0" cy="0" r="18" fill="#7b6cff" fill-opacity="0.65" filter="url(#glowStrongPurple)" />
    <circle cx="0" cy="0" r="7" fill="#f5f7ff" fill-opacity="0.75" />

    <!-- warning markers (paradox tension) -->
    <g transform="translate(110,-110)" opacity="0.55">
      <path d="M0 0 L18 32 H-18 Z" fill="none" stroke="#ff7b8c" stroke-width="2" />
      <path d="M0 12 V22" stroke="#ff7b8c" stroke-width="2" stroke-linecap="round" />
      <circle cx="0" cy="27" r="2" fill="#ff7b8c" />
    </g>
    <g transform="translate(-126,104)" opacity="0.40">
      <path d="M0 0 L16 28 H-16 Z" fill="none" stroke="#ff7b8c" stroke-width="2" />
    </g>
  </g>

  <!-- Connections: architecture -> AI (with a deliberate break to imply paradox) -->
  <g fill="none" stroke="#b2b7d3" stroke-opacity="0.22" stroke-width="2" stroke-linecap="round">
    <path d="M720 234 H780" />
    <path d="M812 234 H870" />
  </g>
  <g fill="#b2b7d3" fill-opacity="0.25">
    <circle cx="720" cy="234" r="4" />
    <circle cx="780" cy="234" r="4" />
    <circle cx="812" cy="234" r="4" />
    <circle cx="870" cy="234" r="4" />
  </g>

  <!-- Logo signature (bottom-right) -->
  <g transform="translate(1122,565)" opacity="0.68" filter="url(#logoShadow)">
    <image href="../logo-only-white-transbg.png" x="-56" y="-56" width="56" height="56" preserveAspectRatio="xMidYMid meet" />
  </g>
</svg>
